name: Daily product spotlight (X + Instagram)

on:
  schedule:
    - cron: "0 16 * * *"  # daily 16:00 UTC (~noon ET) — good engagement window
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  spotlight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Skip if the refresh roundup already tweeted today
        id: gate
        run: |
          if git log --since=midnight --oneline | grep -q "Refresh: trending products"; then
            echo "Catalog refreshed today — the fresh-drops roundup covers it. Skipping spotlight."
            echo "post=false" >> "$GITHUB_OUTPUT"
          else
            echo "post=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.gate.outputs.post == 'true'
        with:
          python-version: "3.12"

      - name: Post today's spotlight
        if: steps.gate.outputs.post == 'true'
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          pip install --quiet requests requests-oauthlib
          python post_daily_tweet.py 2>&1 | tee tweet.log

      - name: Post today's Instagram photo (skips until IG secrets are configured)
        if: steps.gate.outputs.post == 'true'
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: python post_daily_instagram.py

      - name: Credit watch — alert if X credits are depleted
        if: steps.gate.outputs.post == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if grep -q "X_CREDITS_DEPLETED" tweet.log; then
            if ! gh issue list --state open --search "X credits depleted" --json number --jq length | grep -qv '^0$'; then
              gh issue create \
                --title "🔴 X credits depleted — daily tweets are paused" \
                --body "The daily spotlight tweet failed with HTTP 402 (credits depleted). Top up at https://console.x.com (Buy Credits) and tweets resume automatically on the next run. No other store systems are affected."
            else
              echo "Depletion issue already open — not duplicating."
            fi
          else
            echo "Credits OK."
          fi
