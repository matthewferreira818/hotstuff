name: Refresh trending products

on:
  schedule:
    # every 3 days at 09:00 UTC (fires on days 1,4,7,...,28,31 of each month;
    # the month boundary makes one interval shorter than 3 days — close enough)
    - cron: "0 9 */3 * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run refresh script
        env:
          CJ_API_KEY: ${{ secrets.CJ_API_KEY }}
        run: python refresh_products.py

      - name: Commit and push if products.json changed
        run: |
          if ! git diff --quiet -- products.json; then
            git config user.name "wavelist-bot"
            git config user.email "actions@users.noreply.github.com"
            git add products.json
            git commit -m "Trending products refresh (3-day cycle)"
            git push
          else
            echo "No changes to products.json"
          fi
